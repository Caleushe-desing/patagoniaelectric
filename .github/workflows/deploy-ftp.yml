name: Deploy to hosting (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy files via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          sftp_only: true
          local_path: ./
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftpArgs: -o ConnectTimeout=30 -o StrictHostKeyChecking=no
          rsyncArgs: >-
            --exclude=.git
            --exclude=.github
            --exclude=node_modules
            --exclude=.env
            --exclude=data/auth.json
            --exclude=data/messages.json
            --exclude=public/uploads/*
            --exclude=*.log
