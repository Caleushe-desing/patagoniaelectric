name: Deploy to hosting (FTP nativo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Subir sitio por FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir archivos al hosting por FTP nativo
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          python - <<'PY'
          import ftplib
          import os
          import time
          from pathlib import Path

          local_root = Path(".").resolve()
          remote_root = (os.environ.get("FTP_SERVER_DIR") or "/public_html").strip()
          # La app Node/Passenger de Patagonia vive en /patagonia (cPanel nodevenv).
          # Si el secret apunta a public_html, forzar la carpeta correcta de la app.
          if remote_root.rstrip("/") in {"/public_html", "public_html", "/"}:
              remote_root = "/patagonia"
          if not remote_root.startswith("/"):
              remote_root = f"/{remote_root}"

          host = os.environ["FTP_SERVER"].strip().replace("ftp://", "").replace("ftps://", "").rstrip("/")
          port = int(os.environ.get("FTP_PORT") or 21)
          user = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]

          EXCLUDE_DIRS = {".git", ".github", "node_modules", "__pycache__"}
          EXCLUDE_FILES = {".env"}
          EXCLUDE_SUFFIXES = {".log"}

          MAX_ATTEMPTS = 5
          TIMEOUT = 120

          def should_skip(path: Path) -> bool:
              parts = set(path.parts)
              if parts & EXCLUDE_DIRS:
                  return True
              if path.name in EXCLUDE_FILES:
                  return True
              if path.suffix in EXCLUDE_SUFFIXES:
                  return True
              if path.parts[0] == "data" and path.name in {"auth.json", "messages.json"}:
                  return True
              if path.parts[:2] == ("public", "uploads") and path.name != ".gitkeep":
                  return True
              return False

          def connect():
              ftp = ftplib.FTP(timeout=TIMEOUT)
              print(f"Conectando a {host}:{port} ...")
              ftp.connect(host, port)
              ftp.login(user, password)
              ftp.set_pasv(True)
              return ftp

          def ensure_dir(ftp, remote_path):
              current = ""
              for part in remote_path.strip("/").split("/"):
                  current += f"/{part}"
                  try:
                      ftp.mkd(current)
                  except ftplib.error_perm as error:
                      if not str(error).startswith("550"):
                          raise

          def upload_dir(ftp, local_dir, remote_dir):
              ensure_dir(ftp, remote_dir)
              for item in sorted(local_dir.iterdir()):
                  if should_skip(item.relative_to(local_root)):
                      continue
                  remote_path = f"{remote_dir.rstrip('/')}/{item.name}"
                  if item.is_dir():
                      upload_dir(ftp, item, remote_path)
                      continue
                  with item.open("rb") as file:
                      print(f"Subiendo {item} -> {remote_path}")
                      ftp.storbinary(f"STOR {remote_path}", file)

          def deploy():
              ftp = connect()
              try:
                  print(f"FTP pwd inicial: {ftp.pwd()}")
                  try:
                      print("Listado raíz FTP:")
                      ftp.retrlines("LIST", lambda line: print(f"  {line}"))
                  except Exception as list_error:
                      print(f"No se pudo listar raíz FTP: {list_error}")

                  print(f"Usando remote_root={remote_root}")
                  upload_dir(ftp, local_root, remote_root)
                  # Reinicia Phusion Passenger para cargar el nuevo código Node
                  restart_dir = f"{remote_root.rstrip('/')}/tmp"
                  ensure_dir(ftp, restart_dir)
                  restart_path = f"{restart_dir}/restart.txt"
                  payload = f"restart {time.time()}\n".encode("utf-8")
                  from io import BytesIO
                  print(f"Tocando {restart_path} para reiniciar Passenger")
                  ftp.storbinary(f"STOR {restart_path}", BytesIO(payload))

                  # Verificación mínima: confirmar que el portafolio quedó en el remoto
                  marker = f"{remote_root.rstrip('/')}/public/css/portfolio.css"
                  try:
                      size = ftp.size(marker)
                      print(f"Verificación OK: {marker} ({size} bytes)")
                  except Exception as verify_error:
                      raise SystemExit(
                          f"Los archivos no quedaron en la ruta esperada ({marker}): {verify_error}. "
                          "Revise el secret FTP_SERVER_DIR."
                      )

                  # Marcador único para correlacionar carpeta FTP vs sitio público
                  stamp = f"deploy-stamp-{int(time.time())}.txt"
                  stamp_payload = f"patagonia-deploy {time.time()}\n".encode("utf-8")
                  for candidate in [
                      f"{remote_root.rstrip('/')}/public/{stamp}",
                      f"{remote_root.rstrip('/')}/{stamp}",
                  ]:
                      try:
                          ftp.storbinary(f"STOR {candidate}", BytesIO(stamp_payload))
                          print(f"Stamp subido: {candidate} (probar https://www.patagoniaelectric.com/{stamp})")
                      except Exception as stamp_error:
                          print(f"No se pudo subir stamp {candidate}: {stamp_error}")
              finally:
                  try:
                      ftp.quit()
                  except Exception:
                      pass

          last_error = None
          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  print(f"== Intento de despliegue {attempt}/{MAX_ATTEMPTS} ==")
                  deploy()
                  print("Despliegue FTP completado correctamente.")
                  last_error = None
                  break
              except Exception as error:
                  last_error = error
                  wait = attempt * 20
                  print(f"Fallo el intento {attempt}: {error}")
                  if attempt < MAX_ATTEMPTS:
                      print(f"Reintentando en {wait}s ...")
                      time.sleep(wait)

          if last_error is not None:
              raise SystemExit(f"Despliegue FTP fallido tras {MAX_ATTEMPTS} intentos: {last_error}")
          PY
